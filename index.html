<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <script type="text/javascript">
        window.onload = function () {

            var userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // ลิงก์ดาวน์โหลด
            var iosUrl = "https://apps.apple.com/th/app/acharge/id6751375758";
            var androidUrl = "https://play.google.com/store/apps/details?id=com.evota.acharge";
            var defaultUrl = "https://play.google.com/store/apps/details?id=com.evota.acharge";

            // รองรับ iPhone + iPad รุ่นใหม่
            var isIOS =
                /iPad|iPhone|iPod/.test(userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            // iOS
            if (isIOS) {
                window.location.href = iosUrl;

            // Android
            } else if (/android/i.test(userAgent)) {
                window.location.href = androidUrl;

            // อุปกรณ์อื่น
            } else {
                window.location.href = defaultUrl;
            }
        };
    </script>
</head>

<body>
    <p style="text-align:center; font-family:kanit,sans-serif; margin-top:50px;">
        <b>กำลังนำท่านไปยังหน้าดาวน์โหลดแอปพลิเคชัน...</b>
    </p>
</body>
</html>
